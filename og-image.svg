<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#101b1e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#4ade80;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#22c55e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#4ade80" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentLine)"/>

  <!-- Coffee cup icon -->
  <g transform="translate(90, 100)" opacity="0.9">
    <rect x="0" y="12" width="40" height="36" rx="4" fill="none" stroke="#4ade80" stroke-width="3"/>
    <path d="M40 18 C52 18 56 28 56 30 C56 34 52 40 40 40" fill="none" stroke="#4ade80" stroke-width="3"/>
    <rect x="-2" y="48" width="44" height="4" rx="2" fill="#4ade80"/>
    <path d="M10 8 C10 2 14 0 14 0" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
    <path d="M20 6 C20 -2 24 -4 24 -4" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
    <path d="M30 8 C30 2 34 0 34 0" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- DevBrew title -->
  <text x="155" y="148" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="url(#greenGlow)" letter-spacing="-1">DevBrew</text>

  <!-- Separator line -->
  <rect x="90" y="172" width="500" height="2" fill="url(#accentLine)" rx="1"/>

  <!-- Subtitle -->
  <text x="90" y="218" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="600" fill="#e2e8f0">27 Free Developer Tools</text>

  <!-- Tagline -->
  <text x="90" y="258" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#94a3b8">No signup. No tracking. Just tools that work.</text>

  <!-- Tool pills - Row 1 -->
  <g transform="translate(90, 290)">
    <rect x="0" y="0" width="168" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="84" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">JSON Formatter</text>

    <rect x="180" y="0" width="148" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="254" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">JWT Decoder</text>

    <rect x="340" y="0" width="120" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="400" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">Base64</text>

    <rect x="472" y="0" width="150" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="547" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">Regex Tester</text>

    <rect x="634" y="0" width="160" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="714" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">Hash Generator</text>

    <rect x="806" y="0" width="160" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="886" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">SQL Formatter</text>
  </g>

  <!-- Tool pills - Row 2 -->
  <g transform="translate(90, 345)">
    <rect x="0" y="0" width="148" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="74" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">URL Encoder</text>

    <rect x="160" y="0" width="148" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="234" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">Diff Checker</text>

    <rect x="320" y="0" width="148" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="394" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">Cron Parser</text>

    <rect x="480" y="0" width="130" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="545" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">Markdown</text>

    <rect x="622" y="0" width="150" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="697" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">Color Picker</text>

    <rect x="784" y="0" width="140" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="854" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">CSV Viewer</text>
  </g>

  <!-- Tool pills - Row 3 -->
  <g transform="translate(90, 400)">
    <rect x="0" y="0" width="150" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="75" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">UUID Generator</text>

    <rect x="162" y="0" width="120" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="222" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">Timestamp</text>

    <rect x="294" y="0" width="128" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="358" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">QR Code</text>

    <rect x="434" y="0" width="150" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="509" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">HTML Entity</text>

    <rect x="596" y="0" width="160" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="676" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">Lorem Ipsum</text>

    <rect x="768" y="0" width="170" height="42" rx="8" fill="#1a2332" stroke="#2d3d4f" stroke-width="1"/>
    <text x="853" y="27" font-family="monospace" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">+ 10 more tools</text>
  </g>

  <!-- Bottom section -->
  <rect x="0" y="490" width="1200" height="140" fill="#0a0f14" opacity="0.6"/>
  <rect x="0" y="490" width="1200" height="1" fill="url(#accentLine)" opacity="0.5"/>

  <!-- devbrew.org -->
  <text x="90" y="550" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#4ade80">devbrew.org</text>

  <!-- Bottom tagline -->
  <text x="90" y="585" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#64748b">Fast, private, browser-based developer utilities</text>

  <!-- Decorative bracket -->
  <g transform="translate(1060, 520)" opacity="0.15">
    <text font-family="monospace" font-size="80" fill="#4ade80">{ }</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentLine)"/>
</svg>
